<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentHub</title><style>
body{
font-family:Arial,sans-serif;
margin:0;
text-align:center;
transition:0.3s;
}

header{
background:#6a0dad;
color:white;
padding:20px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.card{
margin:15px;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

input, textarea{
width:80%;
padding:10px;
margin:10px;
}
</style></head><body><header>
<h1>📚 StudentHub</h1>
<p>Study Planner • Money Tracker • AI Study Helper</p>
</header><h3>Choose Your Theme</h3><button onclick="changeColor('#6a0dad')">Purple</button>
<button onclick="changeColor('#2196F3')">Blue</button>
<button onclick="changeColor('#4CAF50')">Green</button>
<button onclick="changeColor('#FF9800')">Orange</button>

<button onclick="darkMode()">🌙 Dark Mode</button>

<div class="card">
<h2>📅 Study Planner</h2><input id="task" placeholder="Enter a task"><button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>
</div><div class="card">
<h2>💰 Money Tracker</h2><input id="amount" type="number" placeholder="Enter amount"><button onclick="addMoney()">Save Money</button>

<p>Total Saved: ₦<span id="total">0</span></p>
</div><div class="card">
<h2>🤖 AI Study Helper</h2><textarea id="notes" rows="5" placeholder="Paste notes here"></textarea><br><button onclick="summarize()">Summarize</button>

<p id="summary"></p>
</div><script>

function changeColor(color){
document.querySelector("header").style.background=color;
}

function darkMode(){
document.body.style.background="#111";
document.body.style.color="white";
}

function addTask(){
let task=document.getElementById("task").value;

let li=document.createElement("li");
li.textContent=task;

document.getElementById("taskList").appendChild(li);
}

let total=0;

function addMoney(){
let amount=Number(document.getElementById("amount").value);

total+=amount;

document.getElementById("total").innerText=total;
}

function summarize(){
let notes=document.getElementById("notes").value;

document.getElementById("summary").innerText=
"Summary: " + notes.substring(0,100) + "...";
}

</script></body>
</html>
